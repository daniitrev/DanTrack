<div class="registration-container">
  <div class="registration-card">
    <h2>Регистрация</h2>
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="Введите email" />
      </div>

      <div class="form-group">
        <label for="username">Имя пользователя</label>
        <input id="username" type="text" formControlName="username" placeholder="Введите имя" />
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Введите пароль"
        />
      </div>

      <button type="submit" [disabled]="profileForm.invalid">Зарегистрироваться</button>
    </form>
    @if (userStore.userState.error()) {
      <p class="auth-error">{{ userStore.userState.error() }}</p>
    }
    <a routerLink="/login">Уже есть аккаунт?</a>
  </div>
</div>
